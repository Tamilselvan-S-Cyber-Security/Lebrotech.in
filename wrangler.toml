# Cloudflare Workers static assets (CRA → build/)
#
# In Cloudflare → Settings → Builds, set Deploy command to ONLY this:
#   npm run deploy
#
# Build command:
#   npm run build
#
# Env: NODE_VERSION=20, DISABLE_ESLINT_PLUGIN=true, REACT_APP_*, CLOUDFLARE_API_TOKEN (Workers Scripts Edit)

name = "lebrotechs"
compatibility_date = "2026-07-01"

[assets]
directory = "./build"
not_found_handling = "single-page-application"
