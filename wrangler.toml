# Cloudflare Workers — static assets from CRA `build/`
#
# Dashboard (exact — copy these):
#   Root directory:  (leave EMPTY — do not use build or frontend)
#   Build command:   npm run build
#   Deploy command:  npm run deploy
#   Branch:          main
#
# Env: NODE_VERSION=20, DISABLE_ESLINT_PLUGIN=true, all REACT_APP_*
#      CLOUDFLARE_API_TOKEN → Account: Workers Scripts Edit
#      Wrangler pinned to 4.86.0 for Node 20 CI

name = "lebrotechs"
compatibility_date = "2026-05-03"
workers_dev = true

[assets]
directory = "./build"
not_found_handling = "single-page-application"
html_handling = "auto-trailing-slash"
