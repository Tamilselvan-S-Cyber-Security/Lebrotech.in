# Cloudflare Workers (static assets) — Lebro Tech frontend (CRA / craco)
#
# Cloudflare dashboard build settings (copy exactly — do not change):
#   Build command:  npm run build
#   Deploy command: npx wrangler deploy
#   (Do NOT use wrangler pages deploy)
#
# Env vars: NODE_VERSION=20
#           DISABLE_ESLINT_PLUGIN=true
#           CLOUDFLARE_API_TOKEN=(secret — Workers Scripts Edit)
#           + all REACT_APP_* from .env / .env.example
#
# CLI:
#   npx wrangler login
#   npm run build && npx wrangler deploy
#
# After go-live:
#   1) Add domain to Firebase Auth → Authorized domains
#   2) Add origin to admin API CORS_ORIGINS on Vercel
#   3) Caching → Purge Everything if UI still looks old

name = "lebrotechs"
compatibility_date = "2026-07-01"

[assets]
directory = "./build"
not_found_handling = "single-page-application"
