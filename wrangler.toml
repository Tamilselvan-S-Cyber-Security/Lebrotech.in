# Cloudflare Workers — serves CRA output from build/
#
# Dashboard:
#   Build command:   npm run build
#   Deploy command:  npm run deploy
#
# After deploy open: https://lebrotechs.<your-subdomain>.workers.dev
# (not a leftover Hello World Worker — this overwrites it with build/)

name = "lebrotechs"
compatibility_date = "2026-07-01"

[assets]
directory = "./build"
not_found_handling = "single-page-application"
